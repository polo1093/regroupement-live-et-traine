[pytest]
# Test discovery for the whole monorepo. We run ``pytest`` from the repo
# root so we exercise the shared slim-feature contract, the training
# pipeline and the live decision services from a single entry point.
testpaths =
    shared_decision_features/tests
    aide_decission/tests
    Traine_aide_decission/tests
# Skip generated / vendored trees that must never be scanned.
norecursedirs =
    .git
    .venv
    __pycache__
    .pytest_cache
    outputs
    logs
    poker_solver-main
    projet importer
    ml_dataset_export/tests
    model_exports
# Default flags: concise, show summary, surface the slowest tests
# when the suite takes too long so we can optimise later.
addopts = -ra --strict-markers --tb=short -q
# Don't override the per-project pytest.ini that already lives inside
# ``aide_decission/`` and ``Traine_aide_decission/`` if we ever decide
# to scope runs more finely. Right now they are the same.
markers =
    slow: tests that take more than a second to run
# ``launch.py`` and the train/live sub-projects all live under this
# folder; pytest auto-detects the rootdir from the location of this
# ``pytest.ini``.
